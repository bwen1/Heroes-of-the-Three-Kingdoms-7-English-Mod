String = 24500, Formation Descriptions
String = 24501, A basic formation. Frontline units engage in melee while the rear units coordinate to deploy optimal support capabilities. Classified as a Shield attribute; counters: Mace > x > Sword.
String = 24502, A formation that increases attack power and movement speed. This high-speed attack type is very effective at scattering enemy lines. Attribute: Shield > counters > Mace. \n Max Soldier Attack \n Max Soldier Movement
String = 24503, A formation that increases defense, attack, and movement, suitable for any tactic. Aside from being weak against the "Martial" attribute, it overwhelms all other formations. \n Max Soldier Defense \n Max Soldier Attack \n Max Soldier Movement
String = 24504, A formation that significantly increases defense and movement speed. Both flanks are highly flexible for encircling and neutralizing enemy forces. Most effective with more than 4 Generals. Attribute: Shield > counters > Mace. \n Max Soldier Defense \n Max Soldier Movement
String = 24505, A formation focused on attack and movement speed. The vanguard moves quickly for raids while the rear moves slowly to provide ranged fire support. Sword > counters > Shield. \n Max Soldier Movement \n Max Soldier Attack
String = 34506, A formation focused on increasing attack power, quickly forming a charging squad. Sword > counters > Shield. \n Max Soldier Attack
String = 24507, A formation that increases attack power and movement speed, primarily concentrated in the center to break through dense enemy lines. A top-tier Mace formation attack; only a high-level Sword formation can pose a challenge. \n Max Soldier Attack \n Max Soldier Movement
String = 24508, A formation focused on defense, where units support each other to create the highest defensive capability. A top-tier Shield formation defense; very vulnerable to high-level Sword formations, but strong against Mace formations. \n Max Soldier Defense
String = 24509, Water Mirror Formation. An "invisible" offensive stance that can neutralize enemy attacks; the higher the enemy's attack, the stronger the counter-disruption. The Martial attribute enhances all soldier capabilities. A high-level defensive formation. \n Max Soldier Attack \n Max Soldier Movement \n Max Soldier Defense
