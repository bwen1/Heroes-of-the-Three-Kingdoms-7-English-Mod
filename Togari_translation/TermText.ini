String = 40000, I. Skills and Spirit: Every General has unique skills. Using these skills consumes "Spirit" (Skill Points). When Spirit reaches zero, skills cannot be used. Strategic placement and timing are key to victory.\n\n II. Special Moves: During combat, a General's "Will" (Morale) will increase. When the Will gauge is full, a powerful Special Move will automatically trigger. The power and frequency of these moves depend on the General’s level and specific attributes.\n\n III. Formation Strength: The effectiveness of your troops depends on the formation chosen. Certain formations have absolute advantages over others (e.g., Shield beats Mace). Choosing the right formation before the charge can minimize casualties.\n\n IV. Troop Commands: You can issue orders to your troops such as "Advance," "Stand Ground," or "Withdraw." Effective use of commands allows you to protect your General or trap the enemy.\n\n V. Duels: When two Generals meet, a Duel may be triggered. Winning a duel significantly lowers the enemy army's morale and may lead to an immediate victory.\n\n VI. Capture and Recruitment: Fallen enemy Generals have a chance to be captured. Their loyalty and your "Persuasion" skill determine the success of recruiting them to your side.