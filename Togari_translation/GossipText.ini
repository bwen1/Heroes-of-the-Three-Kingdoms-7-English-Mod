String = 65380,Tao Nhan a Tao Nhan! Doi dau voi Khong Minh ta, mi dam thua co hoi bo chay sao!
String = 65381,Nguoi nguoi deu so am muu quy ke cua Gia Cat Khong Minh nhung Tao Nhan ta coc so dau!
String = 65382,Truong Cap nguoi qua la tuong tai ... nhung dang tiec, du nguoi can than the nao cung khong tron khoi long ban tay cua ta, ha ha ...
String = 65383,Ai chang biet Khong Minh nguoi chi co tai chem gio.Truong Cap ta muon xem xem tren chien truong mi co ban linh gi khong?
String = 65384,Tu khi xuat si toi nay, Khong Minh luon co linh cam se gap go huynh truong tren chien truong.
String = 65385,Nguoi va ta deu vi chu cua minh, khong can cau ne tinh huynh de.
String = 65386,Bat duoc Luu Huyen Duc nguoi la cong lon nha! Dung hong thoat khoi tay ta...
String = 65387,Ai~~ Nguy Dien dung la ho tuong, nhung dang tiec tam tinh phan phuc
String = 65388,Hoang tuong quan con khong chiu nhan minh gia sao? Toi tuoi nay nen ve que ngam keo chan chau di thoi!
String = 65389,Lao phu mot doi duyet nguoi vo so, nhin nguoi anh mat phieu hot bat dinh, chac chan la hang nguoi phan phuc!
