String = 65409,Nghe noi Tao Manh Duc vo co the vang lai chem giet, van co the an thien ha. Nay Chu mo phai linh giao mot phen!
String = 65410,Nghe noi Thai Su Tu lam viec vi loi ich chung, chinh la dai tuong ma ta ao uoc lau nay. Tao mo dung nguoi chi can co tai khong xem xuat than. Sao tuong quan khong chiu gop suc quan ta, lap mot phen thanh tuu trong loan the?!
String = 65411,Tao cong cu viec phong ngua lai day, Thai Su Tu xin linh giao!
