String = 65359,Kha lam Cam Ma Sieu! Nhung tiec mi van chua phai doi thu cua Tao Manh Duc!
String = 65360,Nguoi chinh la Hua Chu - Ho Si chu? Hom nay ta thu xem xem mi co phai hang hu danh hay khong?
