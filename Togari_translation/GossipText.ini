String = 60001,Square Formation: A Shield-type formation. It slightly increases defense power and is highly effective against Sword-type formations. 
String = 20002,Reciprocal Formation: A Sword-type formation. It simultaneously increases the attack power and movement speed of your troops. It counters Mace-type formations. 
String = 60003,Heaven and Earth Formation: An ultimate formation that increases defense, attack, and movement speed all at once. It can counter any formation except the Water Mirror Formation. 
String = 60004,Goose-Wing Formation: A high-level Sword-type formation that increases defense and movement speed. It is effective against Mace-type formations. 
String = 60005,Arrowhead Formation: A Mace-type formation that prioritizes speed; ideal for sudden raids. It counters Shield-type formations. 
String = 60006,Hook Formation: A Mace-type formation shaped like a horn. It increases the attack power of your soldiers and counters Shield-type formations.
String = 60007, Pursuit Formation is a Mace-type formation with the highest movement speed; it increases the attack power of soldiers and counters Shield-type formations.
String = 60008,Vien Hinh Formation is a defensive formation, enhances soldiers' defense, counters sword formations.
String = 60009,Thuy Kinh Formation вҖ“ eliminates intangible threats, neutralizes all other formations, especially counters Heaven and Earth Formation.
