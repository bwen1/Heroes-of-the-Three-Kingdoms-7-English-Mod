String = 65395,Dong toc tuong tan la bat hanh rat lon, tran chien hom nay ... qua that bat dac di ah!
String = 65396,Van Vien doi dich voi ta, le nao muon chet som sao?!
String = 65397,Truong Lieu ta khong phai hang nguoi so chet,thang bai hom nay deu xem thien y!
String = 65398,Tao Nhan hien de, le nao mi quen tinh huynh de sao? Ta khong muon cung dong toc khai chien a!
String = 65399,Xin huynh truong tha thu tieu de. Neu nhu hom nay co chuyen gi xay ra, ta se toi cuu tuyen ta toi voi nguoi a !!!
String = 65400,Tuan Nghia cho sinh ngu dung. Ta chinh la nguoi ai tuong, neu nhu mi toi dau quan ta, tat se trong dung
String = 65401,Tao Manh Duc co ban linh gi cu viec trien khai di, Truong Cap ta khong phai hang nguoi vong an phu nghia.
String = 65402,Tao mo dong lua voi cha may. Ton Ba Phu khong biet ton ti trat tu,pham thuong, ha con the thong gi?
String = 65403,Kieu hung Tao Manh Duc nhu sam ben tai, khong biet co the do duoc may hiep day !!!
String = 65404,Trong Muu that la anh hung duong dai, sao khong kip thoi quy hang de tranh khoi co nghiep ba doi Ton gia huy hoai ngay day!
String = 65405,Phong tam mat nhin thien ha, co the cung Ton mo doi dich chi co mot, hai nguoi. Hom nay ta nhat dinh phai cung Tao Manh Duc quyet phan thang bai.
