String = 65309,Thuc su la anh hung xuat thieu nien a... Duoc! De ta xem ban lanh that su cua mi ra sao.
String = 65310,Hoang lao tuong quan tai cao gan lon uy chan cac chau. Tu Long xin chi giao!
String = 65311,Tieu tu Trieu Van nguoi van xem la mot nhan vat. Nay ta de nguoi mo rong tam mat, the nao la cong phu chan that cua Hoang Trung.
