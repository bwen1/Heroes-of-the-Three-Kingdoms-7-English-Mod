String = 65415,Mac du Trong Dat ham mo Tao cong dai tai, nhung tran chien ngay hom nay kho long tranh khoi!
String = 65416,Ma Manh Khoi, hai nguoi chung ta hom nay rot cuoc doi dau, quyet thang mot tran di!
