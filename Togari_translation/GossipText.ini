String = 60110,[Pre-Duel Dialogue - Taunting] 
String = 60111,Today, we shall seize this traitor for the sake of the realm! 
String = 60112,Even though my horse may be weary, capturing #b02# is still well within my power! 
String = 60113,You are a rebel acting against heaven; do not blame my blade for being merciless! 
String = 60114,It is not that #a03# wishes to bully the weak, but you remain stubbornly misguided. Forgive me! 
String = 60115,This is a struggle for the Mandate of Heaven; victory and defeat are simply the way of the world! 
String = 60116,#b02# dares to challenge me? Whatever skill you have, show it now! 
String = 60117,#a03# shall start a massacre today, teaching you a lesson for daring to challenge a great general!
String = 60118,Hmph! Stop your rambling. Little thief, take this! 
String = 60119,An ignorant junior dares to challenge this general? You are truly seeking death! 
String = 60120,Splendid! Let us match our strength today; life and death depend on our own skill! 
String = 60121,Those who defy heaven do not live long. You have the nerve to challenge me, #a03#! 
String = 60122,To have the guts to challenge #a03#, you are certainly brave! 
String = 60123,Use every bit of skill you have; it will soon be clear who is weak and who is strong! 
String = 60124,#a02# is here! You ignorant fool, kneel and surrender immediately! 
String = 60125,Facing #a03#, you will not escape the sting of defeat!
String = 60126,Ha ha! I see the God of War smiling upon me; this battle is already won! 
String = 60127,Today, I shall open your eyes to the true power of a Northern Warrior! 
String = 60128,Face-to-face combat is the way of the Northern Brave; make your move! 
String = 60129,Today, under the witness of the God of War, let us settle this 1-on-1! 
String = 60130,A warrior of the Great Desert accepts your challenge; I hope you don't disappoint me! 
String = 60131,Offer up your life! Today, you will witness the tiger-like strength of the Southern Men!
String = 60132,You dare duel a Nanman Warrior? Try not to wet yourself in a moment! 
String = 60133,The Nanman warriors are fierce; today, I shall broaden your horizons! 
String = 60134,After witnessing the raw might of a Nanman Brave, you will regret ever stepping onto the field yourself! 
String = 60135,Daring to engage in a solo duel with a Nanman warrior? LetвҖҷs see what skills you actually possess!
String = 60136,Words are useless! Let us settle this in a duel! 
String = 60137,You have the courage to duel a warrior of the Wa Kingdom, but I fear you lack the skill to emerge victorious! 
String = 60138,To face a Wa warrior alone... I, #a02#, admire your spirit! 
String = 60139,The Wa warrior #a02# is here! Whatever tricks you have, use them now! 
String = 60140,I am the Wa warrior #a02#. Today, I shall show you the true majesty of the Wa people! 
String = 60141,Dare to look down upon my martial arts? You shall reap only humiliation! 
String = 60142,Though I am but a woman, I rarely lose a duel. Do you have the nerve to test me, little brother? 
String = 60143,This lady is no fragile woman; many famous generals have already fallen by my hand! 
String = 60144,To be defeated by my hand is an honor you should cherish! Hee hee! 
String = 60145,On the contrary, I want to see what skills you truly possess. Take this!
