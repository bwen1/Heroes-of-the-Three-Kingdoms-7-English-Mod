String = 65346,Tao Nhan tieu nhi kien thuc nong can, cung dam ra chien truong sao?
String = 65347,Lao that phu! Dam chan duong Tao Nhan ta, cho nguoi chet khong toan thay.
String = 65348,Dong Tac! Xem Hoang Trung ta chem nguoi thanh thit vun, chuoc toi hoa quoc uong dan!
String = 65349,Lao that phu, ta phai xem nguoi ngu ma phan thay !
String = 65350,Ma Sieu ta uy chan tai ngoai, nguoi Khuong con so mat dep. Luu Huyen Duc con khong mau chiu troi.
String = 65351,Kha lam Ma Manh Khoi, khen thay thieu nien anh hung Cam Ma Sieu. Luu mo xin lanh giao cao chieu!
