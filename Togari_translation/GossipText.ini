String = 65336,Dam trung mat Hoang Trung ta, khong so con mat con lai cung mu luon sao?!
String = 65337,Ong lao, nhin thay Ha Hau Don ta con khong cup duoi bo chay di a nha?
String = 65338,Ha Hau Uyen nhan lay cai chet!
String = 65339,Ong lao toi dai lao quan ta duong lao di thoi!
String = 65340,Nghe noi Truong Lieu van vo song toan, nay Hoang Trung toi linh giao nguoi!
String = 65341,Lao tuong quan duc cao vong trong, thu cho Truong Lieu mao pham!
String = 65342,Lao phu da som muon cung Ho Si Hua Chu giao thu!
