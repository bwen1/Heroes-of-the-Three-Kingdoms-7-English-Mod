String = 13500,Unit Description
String = 13501,Heavy Infantry, basic infantry unit in SG. Highly effective when fighting Bow and Crossbow units. Very ineffective and countered by Cavalry.
String = 13502,Divine Blade, the upgraded unit of Trong Bo. Not only increases attack rate; Than Dao can also trigger Sudden Strike, damaging two rows of troops.
String = 13503,Longbowmen, ranged infantry that attacks from afar. Although it has a low attack rate and needs melee support, it pairs with other unit types to maximize value.
String = 13504,Power bowmen, the upgraded form of Truong Cung. Attack rate and attack range are increased. Can activate Fire Blossom skill, dealing double damage.
String = 13505,Long Spearmen, a special infantry type of the Foot soldiers. Although its combat ability is weaker than Foot soldiers, it is very effective against Cavalry.
String = 13506,Heavy Halberdiers, the upgraded form of Truong Thuong. Overall attack power is increased. Can activate Sweeping Strike, attacking simultaneously across three rows.
String = 13507,Power Crossbowmen, a long-range assault unit. Because it can only attack directly, it cannot attack when blocked by other unit types.
String = 13508,Heavy Crossbowmen, the upgraded form of Cuong No. Increases speed and firing range. Can activate Armor-Piercing Advance, piercing up to three rows.
String = 13509,Axe Cavalry, an advanced skirmisher with high mobility and attack. However, it must avoid Spearmen, as it is countered by them.
String = 13510,Heavy Cavalry, the upgraded form of Axe Cavalry, with higher movement speed. Can activate Charge, a special attack that strikes three rows.
String = 13511,Rattan Infantry, a special Southern Barbarian heavy armor unit. As part of the Foot troops it is still weak against Cavalry. Despite large size and high strength, it cannot fight large numbers of ranged units.
String = 13512,Heavy Barbarian, the upgraded form of Rattan Infantry. Overall attack is increased. Can activate Guard, becoming immune to damage.
String = 13513,Bodyguard, movement speed only slightly slower than Cavalry, but weaker in melee. Performs best when given distance to attack; provides excellent support.
String = 13514,Divine Guard, the upgraded form of Bodyguard. Increases speed and attack range. Can activate Triple Strike, damaging three rows.
String = 13515,Fierce Beast, a special Southern Barbarian cavalry. Strong against Foot troops, with high movement speed. Weak when facing Can Ve attackers.
String = 13516,Elephant Cavalry, the upgraded form of Fierce Beast. Movement speed reduced, defense increased. Can use Heavy Impact to bypass defense and deal direct damage.
String = 13517,Ninja, a special Royal Guard infantry. Similar capabilities to Can Ve units, with versatile attacks. Small attack range but higher movement speed.
String = 13518,Hidden Ninja, the upgraded form of Ninja. Speed and attack range increased. Special skill Stealth: the entire unit becomes invisible and is revealed when attacking.
String = 13519,Heavy crossbow, a rare ranged unit. Attacks from very long distance, needs melee support, and has low flexibility. Cannot attack when blocked.
String = 13520,Crossbow Wagon, the upgraded form of Heavy crossbow. Extremely long attack range. Can activate Piercing Earth Front, piercing up to five rows.
String = 13521,Catapult, a very rare ranged unit. Has very long attack range and the highest damage range among infantry.
String = 13522,Flying Stone Wagon, the upgraded form of Catapult. Increases attack speed and can activate Incendiary Shot, with huge power and burning effect.
String = 13523,Yellow Turban, an auto-deploy infantry. Combat ability is weaker among Foot troops but it is the only unit type that can counter Siege units.
String = 13524,Yellow Turban Spearman, the upgraded form of Yellow Turban. Increases attack rate. Has Blood Absorb skill, which drains life to boost combat power.
String = 13525,Huns, a special Barbarian infantry. Lower combat ability than Cavalry but resists Bow, Crossbow and Barbarian units better; has the highest movement speed.
String = 13526,Huns Cavalry, the upgraded form of Nomad Cavalry. Increases movement speed. Can activate Rooted Strike, chance to stun, dealing heavy damage to four rows.
String = 13527,Ronin, a special Royal Guard archer. Highest attack power among Foot troops, but slow movement.
String = 13528,Samurai, the upgraded form of Ronin. Increases attack rate. Can activate House Breaker, damaging three rows.
String = 13529,Zombie Soldier, a special infantry type. Slowest movement speed, but highest defense among Foot troops.
String = 13530,Zombie Demon, the upgraded form of Zombie Soldier. Movement speed slightly increased. After killing an enemy, can trigger Summon Phantom, causing militia to appear.
String = 13531,Wooden Golem, an extremely rare siege unit. Low movement speed, high defense, narrow attack range.
String = 13532,Iron Golem, the upgraded form of Wooden Golem. Increases defense and attack range. On death, can trigger Self-Destruct, dealing damage to 10 rows.
String = 13533,Blade Wagon, a special Barbarian infantry. Slow movement, low attack rate and low attack power. Used to counter M?c Nh?n, Cavalry, and M?c Chuy.
String = 13534,Iron Blade Wagon, the upgraded form of Blade Wagon. Increases defensive strength; can activate Ramming Charge, dealing damage to 6 rows.
String = 13535,Swordsman, a light, flexible infantry. Movement speed comparable to Cavalry, fastest attack speed, vulnerable to ranged attacks.
String = 13536,Sword Guard, the upgraded form of Swordsman. Attack speed and attack power both increase. Can trigger Sword Guard, dealing damage to 3 rows.
String = 13537,Wooden Mallet, attack power comparable to Thiet Moc Nhan, but movement and attack are slower. Equipped with M?c Chuy, very effective at breaking walls.
String = 13538,Iron Mace, the upgraded form of Wooden Mallet. Highest attack power among infantry. Can trigger Earth Stomp, dealing damage to 8 rows.
String = 13539,Hook Chain, a special Barbarian infantry. Weaker than Foot troops but with fast movement and equipped with Hook, effective against walls.
String = 13540,Power Hook, the upgraded form of Hook Chain. Fastest movement speed. Can trigger Massive Smash, dealing damage to 8 rows.
String = 13541,Marines, a special naval infantry. Capabilities similar to Foot troops; unique interactions with other unit types and stable attack rate.
String = 13542,Scale Armor Navy, the upgraded form of Marines. Basically no different from Marines. When in water, has naval combat traits and overall stats increase.
String = 13543,Horse Archer, mounted archers that attack from range. Very mobile on the battlefield and deal high bow damage. Weakness: vulnerable in melee.
String = 13544,Heavy Horse Archer, the upgraded form of Horse Archer. Further increases damage. However, still relatively weak in melee.
String = 13545,Battle Maiden, a special infantry. Female troops attack with dance-based moves. Can buff allied units' combat power.
String = 13546,Battle Empress, the upgraded form of Battle Maiden In addition to previous abilities, gains combat capability and contributes to increasing Charm level.
String = 13547,Divine Sword Bodyguard, evolutionary warrior class. Strong sustained damage, > General. Can use Sweeping Strike, dealing sweeping damage across 3 rows.
String = 13548,Divine Spear Bodyguard, evolutionary. Strong sustained damage, > General. Can use Siege Assault, dealing straight damage to 3 rows.
String = 13549,Suanni Iron Cavalry, evolutionary. Strong sustained damage, > General. Can use Heavy Impact, bypassing defense and causing direct damage.
String = 13550,Holy Battle Maiden, evolutionary. Strong sustained damage, > General. Can summon the Grass Army to fight alongside in battle.
String = 13551,East Sea Island Nation special unit, possesses magical abilities.
String = 13552,East Sea Island Nation special unit, has absolute faith in Women =).
