String = 13563,Bandit, abilities similar to Swordsmen.
String = 13564,Female Bandit, abilities similar to Infantry.
String = 13565,Western Region Strongman, abilities similar to Hammer Soldiers.
String = 13566,Special heavy artillery unit, a massive cannon with earth?shaking power.
